<!-- verify-email.component.html -->

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="page">
  <div class="card">

    <!-- Animated shimmer bar -->
    <div class="card-bar"></div>

    <!-- Logo header -->
    <div class="card-header">
      <div class="logo-mark">
        <svg width="36" height="36" viewBox="0 0 52 52" fill="none">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="52" x2="52" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#c4b5fd"/>
            </linearGradient>
          </defs>
          <path d="M26 44 L4 29 L12 29 L26 37 L40 29 L48 29 Z" fill="#7c3aed" opacity="0.28"/>
          <path d="M26 31 L4 16 L12 16 L26 24 L40 16 L48 16 Z" fill="#9d67f5" opacity="0.6"/>
          <path d="M26 18 L4 3 L12 3 L26 11 L40 3 L48 3 Z"    fill="url(#logoGrad)"/>
        </svg>
      </div>
      <div class="logo-word">Pro<span>p</span>el</div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- State icon ring -->
      <div class="icon-ring">

        <!-- Base track ring -->
        <svg class="ring-svg" viewBox="0 0 88 88">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#A78BFA"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="44" cy="44" r="39"/>
        </svg>

        <!-- Loading spinner -->
        <svg class="ring-svg spinner"
             viewBox="0 0 88 88"
             [class.hidden]="state !== 'loading'">
          <circle class="spinner-arc" cx="44" cy="44" r="39"/>
        </svg>

        <!-- Success checkmark -->
        <svg class="ring-svg"
             viewBox="0 0 88 88"
             [class.hidden]="state !== 'success'"
             [class.visible]="state === 'success'">
          <circle cx="44" cy="44" r="39"
                  fill="rgba(52,211,153,0.1)"
                  stroke="rgba(52,211,153,0.25)"
                  stroke-width="1.5"/>
          <path class="check-path"
                [class.drawn]="checkDrawn"
                d="M28 44 L39 55 L60 33"/>
        </svg>

        <!-- Error cross -->
        <svg class="ring-svg"
             viewBox="0 0 88 88"
             [class.hidden]="state !== 'error'"
             [class.visible]="state === 'error'">
          <circle cx="44" cy="44" r="39"
                  fill="rgba(239,68,68,0.1)"
                  stroke="rgba(239,68,68,0.2)"
                  stroke-width="1.5"/>
          <path class="cross-path" [class.drawn]="crossDrawn" d="M32 32 L56 56"/>
          <path class="cross-path" [class.drawn]="crossDrawn" d="M56 32 L32 56"/>
        </svg>

        <!-- Inner circle icon -->
        <div class="ring-inner"
             [class.success-ring]="state === 'success'"
             [class.error-ring]="state === 'error'">
          @if (state === 'loading') {
            <span>✉️</span>
          }
        </div>

      </div>

      <!-- Progress dots -->
      <div class="dots">
        @for (dot of [0, 1, 2]; track dot) {
          <div class="dot"
               [class.active]="activeDot === dot"
               [class.done]="activeDot > dot">
          </div>
        }
      </div>

      <!-- Title -->
      <div class="state-title">{{ title }}</div>

      <!-- Description -->
      <p class="state-desc" [innerHTML]="description"></p>

      <!-- Status badge -->
      <div class="badge visible"
           [class.loading]="state === 'loading'"
           [class.success]="state === 'success'"
           [class.error]="state === 'error'">
        <div class="badge-dot"></div>
        <span>{{ badgeText }}</span>
      </div>

      <!-- Action button — shown only on success / error -->
      <button
        class="action-btn"
        [class.visible]="state === 'success' || state === 'error'"
        (click)="handleAction()">
        {{ actionLabel }}
      </button>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      © 2026 Propel &middot; Secure email verification
    </div>

  </div>
</div>
