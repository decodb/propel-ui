<app-forgot-password-dialog
  [visible]="dialogVisible"
  [state]="dialogState"
  [email]="form.get('email')?.value!"
  [rateLimitSeconds]="60"
  (closed)="onDialogClose()"
  (retryRequested)="onRetry()"
  (resendRequested)="onResend()">
</app-forgot-password-dialog>

<section>
    <form appIntersectionObserver [threshold]="1" (intersecting)="onForgotPasswordFormIntersection($event)" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="header">
            <h3>Forgot your password?</h3>
            <p>A code will be sent to your email address to help reset your password</p>
        </div>
        <div class="fields">
            <div class="field" [class.scaledIn]="forgotPasswordField.email">
                <label for="email">Email <span>*</span></label>
                <div class="input">
                    <input id="email" type="email" placeholder="eg. b_mkwanazi@icloud.com" formControlName="email">
                </div>
            </div>
            @if (hasError('email', 'required')) {
                    <p class="error">Email is required<p>
                }

            @if (hasError('email', 'email')) {
                <p class="error">Please enter a valid email <p>
            }
        </div>
        <div class="button">
            <button class="btn" type="submit" [disabled]="isLoading()" [class.loading]="isLoading()">
                    @if(isLoading()) {
                        <span class="orbit-ring" aria-hidden="true">
                            <svg viewBox="0 0 16 16">
                            <g class="dot1"><circle cx="8" cy="8" r="2" fill="#000"/></g>
                            <g class="dot2"><circle cx="8" cy="8" r="2" fill="#000"/></g>
                            <g class="dot3"><circle cx="8" cy="8" r="2" fill="#000"/></g>
                            </svg>
                        </span>
                        <span>Requesting an OTP</span>
                    } @else {
                        <span>Request an OTP</span>
                    }
                </button>
            <p>Don't have an account? <a routerLink="/sign-up">Sign up</a></p>
        </div>
        <a routerLink="/sign-in" class="btn btn-secondary back"><ion-icon name="arrow-back-outline"></ion-icon> Back to login</a>
    </form>
</section>
